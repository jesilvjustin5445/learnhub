name: Deploy LearnHub

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy
      run: |
        cd ~/learnhub
        git pull origin main
        docker-compose down
        docker-compose up --build -d
        sudo systemctl restart nginx
